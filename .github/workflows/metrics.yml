name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push: { branches: ["master", "main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICSTOKEN}}

          # Core Options
          user: Youssef-Ashraf2099
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Cairo

          # 📅 Isometric commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Show 6 months of activity

          # 🈷️ Languages activity
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # 📓 Featured repositories (Displays your pinned or top repos)
          plugin_repositories: yes
          plugin_repositories_featured: Youssef-Ashraf2099/Youssef-Ashraf2099, Youssef-Ashraf2099/Youssef-Ashraf2099
          # Replace the above names with the specific repos you want to feature!

          # 🏆 Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact # Options: detailed, compact
          plugin_achievements_secrets: yes # Show hidden achievements
          plugin_achievements_threshold: C # Display level C or higher

          # Your existing plugins
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_followup: yes
          plugin_followup_sections: repositories
